<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f3f4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Trolesi Connect" />
    <meta name="description" content="Trolesi Connect — conversor exclusivo para revendedores Trolesi Joias." />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Trolesi Connect</title>
  </head>
  <body>
    <div class="app-shell">
      <main class="app">
        <header class="topbar">
          <div class="brand">
            <div class="monogram">T</div>
            <div class="brand-name">Trolesi</div>
          </div>
          <div class="topbar-actions">
            <button class="ghost-btn" id="btnInstall" type="button">Instalar</button>
          </div>
        </header>

        <section class="screen" id="homeScreen">
          <div class="hero-card">
            <div class="hero-eyebrow">Trolesi Joias</div>
            <h1 class="hero-title">Trolesi Connect</h1>
            <p class="hero-subtitle">Ferramentas exclusivas para revendedores, com precisão e presença.</p>
            <div class="hero-actions">
              <button class="primary-btn" id="btnOpenConverter" type="button">Conversor de código</button>
              <button class="secondary-btn" id="btnOpenHistory" type="button">Histórico</button>
              <button class="secondary-btn" id="btnOpenWhatsApp" type="button">WhatsApp</button>
            </div>
          </div>
        </section>

        <section class="screen hidden" id="converterScreen">
          <div class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Código da peça</h2>
              <button class="ghost-btn" id="btnBack" type="button">Voltar</button>
            </div>

            <div class="input-wrap">
              <label class="input-label" for="codigo">Código</label>
              <input id="codigo" class="code-input" inputmode="decimal" autocomplete="off" placeholder="Ex.: 10,5" />
            </div>

            <div class="result-box" aria-live="polite">
              <span class="result-label">Valor estimado</span>
              <div class="result-value" id="resultado">R$ 0,00</div>
            </div>

            <div class="panel-actions">
              <button class="secondary-btn" id="btnClear" type="button">Limpar</button>
              <button class="primary-btn" id="btnSave" type="button">Salvar</button>
            </div>
          </div>
        </section>

        <section class="screen hidden" id="historyScreen">
          <div class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Histórico</h2>
              <button class="ghost-btn" id="btnBackHistory" type="button">Voltar</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
            <div class="panel-actions">
              <button class="secondary-btn" id="btnClearHistory" type="button">Limpar</button>
            </div>
          </div>
        </section>

        <footer class="footer">Trolesi Joias • Atacado desde 1990 • Itajubá-MG</footer>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
