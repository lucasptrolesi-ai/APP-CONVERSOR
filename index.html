<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c9959f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Trolesi Connect" />
  <meta name="description" content="Trolesi Connect - Ferramentas para revendedores Trolesi Joias. Conversor de código, histórico e acesso direto." />
  <link rel="manifest" href="manifest.json" />
  <title>Trolesi Connect | Ferramentas para Revendedores</title>
  <style>
    :root {
      --rosa-trolesi: #c9959f;
      --rosa-claro: #f8e8eb;
      --vinho: #6f3f48;
      --dourado: #c9a45c;
      --champagne: #f4e4bd;
      --branco: #fff;
      --texto: #5d4449;
      --sombra: rgba(74, 42, 48, .22);
      --verde-whats: #25d366;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--vinho);
      background:
        radial-gradient(circle at 10% 5%, rgba(255,255,255,.52), transparent 30%),
        radial-gradient(circle at 90% 92%, rgba(201,164,92,.28), transparent 34%),
        linear-gradient(135deg, var(--rosa-claro), var(--rosa-trolesi));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }
    .app { 
      width: 100%; 
      max-width: 460px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    
    /* Header */
    .header {
      background: var(--branco);
      border-bottom: 1px solid rgba(201,164,92,.2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px var(--sombra);
    }
    .logo-header { font-size: 16px; font-weight: 700; color: var(--vinho); letter-spacing: 2px; }
    .header-actions { display: flex; gap: 12px; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      padding: 8px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(201,164,92,.1); }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    /* Card */
    .card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,.95);
      border: 1px solid rgba(201,164,92,.58);
      border-radius: 30px;
      box-shadow: 0 24px 65px var(--sombra);
      padding: 30px 24px 22px;
      text-align: center;
      width: 100%;
      animation: slideIn 0.4s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:before {
      content: "";
      position: absolute;
      inset: -80px -100px auto auto;
      width: 210px;
      height: 210px;
      background: radial-gradient(circle, rgba(201,164,92,.34), transparent 68%);
    }
    .brand { position: relative; z-index: 1; }
    .brand h1 {
      margin: 0 0 8px;
      letter-spacing: 4px;
      font-size: 28px;
      text-transform: uppercase;
      color: var(--vinho);
    }
    .gold-line {
      width: 88px;
      height: 2px;
      margin: 13px auto 15px;
      background: linear-gradient(90deg, transparent, var(--dourado), transparent);
    }
    .subtitle { margin: 0 0 24px; color: var(--texto); font-size: 15px; font-weight: 500; }
    
    /* Home Buttons */
    .home-section { display: flex; flex-direction: column; gap: 16px; }
    .home-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }
    .home-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 16px;
      border-radius: 18px;
      border: 1px solid rgba(201,164,92,.4);
      background: rgba(255,255,255,.6);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 700;
      font-size: 13px;
      color: var(--vinho);
    }
    .home-btn:active { transform: scale(0.95); }
    .home-btn-icon { font-size: 32px; }
    .home-btn.whatsapp { background: var(--verde-whats); color: var(--branco); border: none; }

    /* Sections */
    .converter-section, .history-section { display: none; }
    .converter-section.active, .history-section.active { display: block; }
    
    .field { text-align: left; }
    label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 9px; color: var(--vinho); }
    input {
      width: 100%;
      height: 64px;
      border-radius: 18px;
      border: 1.5px solid rgba(201,164,92,.78);
      background: var(--branco);
      padding: 0 18px;
      font-size: 30px;
      text-align: center;
      color: var(--vinho);
      outline: none;
      box-shadow: inset 0 2px 8px rgba(111,63,72,.07);
      font-weight: 500;
    }
    input:focus { box-shadow: 0 0 0 4px rgba(201,164,92,.16), inset 0 2px 8px rgba(111,63,72,.07); }
    input::placeholder { color: rgba(111,63,72,.4); }
    
    .result {
      margin-top: 22px;
      border: 1px solid rgba(201,164,92,.58);
      border-radius: 23px;
      padding: 21px 14px;
      background: linear-gradient(135deg, #fff9ec, #fff);
    }
    .result span { display: block; font-size: 13px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--texto); margin-bottom: 8px; }
    .result strong { display: block; font-size: 42px; line-height: 1.05; color: var(--vinho); font-weight: 700; }
    
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    button, .linkbtn {
      border: none;
      border-radius: 16px;
      min-height: 48px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    button:active { transform: scale(0.98); }
    .primary { background: linear-gradient(135deg, var(--dourado), var(--champagne)); color: #5b3d18; }
    .secondary { background: #fff; color: var(--vinho); border: 1.5px solid rgba(201,164,92,.55); }
    .secondary:hover { background: rgba(201,164,92,.05); }
    
    /* History */
    .history-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,.6);
      border: 1px solid rgba(201,164,92,.3);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-item:active { transform: scale(0.98); background: rgba(201,164,92,.05); }
    .history-code { font-weight: 700; color: var(--vinho); font-size: 16px; }
    .history-value { color: var(--dourado); font-weight: 700; }
    .history-empty { text-align: center; color: var(--texto); padding: 40px 20px; font-size: 14px; }

    /* Footer */
    .footer {
      background: var(--branco);
      border-top: 1px solid rgba(201,164,92,.2);
      padding: 16px 20px;
      text-align: center;
      font-size: 12px;
      color: rgba(111,63,72,.75);
      line-height: 1.6;
      box-shadow: 0 -2px 8px var(--sombra);
    }
    .footer-brand { font-weight: 700; color: var(--vinho); margin-bottom: 4px; }
    
    .hint { margin: 15px 0 0; color: var(--texto); font-size: 12px; line-height: 1.45; }

    /* Responsive */
    @media (max-width: 600px) {
      .app { max-width: 100%; }
      .card { border-radius: 24px; padding: 24px 20px; }
      .brand h1 { font-size: 24px; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-header">TROLESI CONNECT</div>
      <div class="header-actions">
        <button class="icon-btn" id="btnHome" title="Início">🏠</button>
        <button class="icon-btn" id="btnInstallHeader" style="display:none;" title="Instalar app">⬇️</button>
      </div>
    </header>

    <main class="content">
      <section class="card">
        <!-- Home -->
        <div id="homeView" class="home-section">
          <div class="brand">
            <h1>Trolesi Connect</h1>
            <div class="gold-line"></div>
            <p class="subtitle">Ferramentas para revendedores</p>
          </div>

          <div class="home-buttons">
            <button class="home-btn" id="btnConverter">
              <span class="home-btn-icon">🔢</span>
              <span>Conversor</span>
            </button>
            <button class="home-btn whatsapp" id="btnWhatsApp">
              <span class="home-btn-icon">💬</span>
              <span>WhatsApp</span>
            </button>
            <button class="home-btn" id="btnHistory">
              <span class="home-btn-icon">📋</span>
              <span>Histórico</span>
            </button>
            <button class="home-btn" id="btnInstallHome">
              <span class="home-btn-icon">📱</span>
              <span>Instalar</span>
            </button>
          </div>
        </div>

        <!-- Converter -->
        <div id="converterView" class="converter-section">
          <div class="brand">
            <h1>Conversor</h1>
            <div class="gold-line"></div>
            <p class="subtitle">Digite o código da peça</p>
          </div>

          <div class="field">
            <label for="codigo">Código</label>
            <input id="codigo" inputmode="decimal" autocomplete="off" placeholder="Ex: 10,0" autofocus />
          </div>

          <div class="result" aria-live="polite">
            <span>Valor da peça</span>
            <strong id="resultado">R$ 0,00</strong>
          </div>

          <div class="actions">
            <button class="secondary" type="button" id="limpar">Limpar</button>
            <button class="primary" type="button" id="copiar">Copiar</button>
          </div>

          <p class="hint">Use vírgula ou ponto. Ex: 10,5 ou 10.5</p>
        </div>

        <!-- History -->
        <div id="historyView" class="history-section">
          <div class="brand" style="margin-bottom: 20px;">
            <h1>Histórico</h1>
            <div class="gold-line"></div>
          </div>

          <ul class="history-list" id="historyList"></ul>

          <button class="secondary" type="button" id="limparHistorico" style="width: 100%; margin-top: 16px;">Limpar Histórico</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-brand">Trolesi Joias</div>
      <div>Atacado desde 1990</div>
      <div>Itajubá - MG</div>
    </footer>
  </div>

  <script>
    // CONFIG
    const FATOR = 2.8;
    const WHATSAPP_NUMBER = '5535998603736';

    // DOM
    const input = document.getElementById('codigo');
    const resultado = document.getElementById('resultado');
    const btnHome = document.getElementById('btnHome');
    const btnConverter = document.getElementById('btnConverter');
    const btnWhatsApp = document.getElementById('btnWhatsApp');
    const btnHistory = document.getElementById('btnHistory');
    const btnLimpar = document.getElementById('limpar');
    const btnCopiar = document.getElementById('copiar');
    const limparHistorico = document.getElementById('limparHistorico');
    const historyList = document.getElementById('historyList');
    const btnInstalarHome = document.getElementById('btnInstallHome');
    const btnInstalarHeader = document.getElementById('btnInstallHeader');
    const homeView = document.getElementById('homeView');
    const converterView = document.getElementById('converterView');
    const historyView = document.getElementById('historyView');
    let installPrompt = null;

    // Formata valor em Real
    function moeda(valor) {
      return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // Normaliza entrada (vírgula para ponto)
    function normalizar(texto) {
      return texto.trim().replace(',', '.');
    }

    // Calcula valor automaticamente
    function calcular() {
      const raw = normalizar(input.value);
      const codigo = Number.parseFloat(raw);
      if (!raw || Number.isNaN(codigo)) {
        resultado.textContent = 'R$ 0,00';
        return { codigo: '', valor: 0 };
      }
      const valor = codigo * FATOR;
      resultado.textContent = moeda(valor);
      return { codigo: input.value, valor };
    }

    // Eventos do conversor
    input.addEventListener('input', calcular);

    btnLimpar.addEventListener('click', () => {
      input.value = '';
      calcular();
      input.focus();
    });

    btnCopiar.addEventListener('click', () => {
      const valor = resultado.textContent;
      navigator.clipboard.writeText(valor).then(() => {
        const txt = btnCopiar.textContent;
        btnCopiar.textContent = 'Copiado!';
        setTimeout(() => { btnCopiar.textContent = txt; }, 2000);
      });
    });

    // Salva no histórico ao sair do input
    input.addEventListener('blur', () => {
      const { codigo, valor } = calcular();
      if (codigo && valor > 0) {
        salvarNoHistorico(codigo, valor);
      }
    });

    // Navegação entre seções
    function showView(view) {
      homeView.classList.remove('active');
      converterView.classList.remove('active');
      historyView.classList.remove('active');
      view.classList.add('active');
    }

    btnHome.addEventListener('click', () => showView(homeView));
    btnConverter.addEventListener('click', () => { 
      showView(converterView); 
      input.focus(); 
    });
    btnWhatsApp.addEventListener('click', () => {
      window.open(`https://wa.me/${WHATSAPP_NUMBER}`, '_blank');
    });
    btnHistory.addEventListener('click', () => { 
      showView(historyView); 
      renderHistory(); 
    });

    // Histórico com localStorage
    function salvarNoHistorico(codigo, valor) {
      let historico = JSON.parse(localStorage.getItem('trolesiHistorico') || '[]');
      historico.unshift({ codigo, valor, data: new Date().toISOString() });
      historico = historico.slice(0, 5); // Máximo 5 itens
      localStorage.setItem('trolesiHistorico', JSON.stringify(historico));
    }

    function renderHistory() {
      const historico = JSON.parse(localStorage.getItem('trolesiHistorico') || '[]');
      historyList.innerHTML = '';
      
      if (historico.length === 0) {
        historyList.innerHTML = '<div class="history-empty">Nenhum código consultado ainda</div>';
        return;
      }

      historico.forEach(item => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `
          <span class="history-code">${item.codigo}</span>
          <span class="history-value">${moeda(item.valor)}</span>
        `;
        li.addEventListener('click', () => {
          input.value = item.codigo;
          calcular();
          showView(converterView);
          input.focus();
        });
        historyList.appendChild(li);
      });
    }

    limparHistorico.addEventListener('click', () => {
      if (confirm('Deseja limpar o histórico?')) {
        localStorage.removeItem('trolesiHistorico');
        renderHistory();
      }
    });

    // PWA - Instalação
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPrompt = e;
      btnInstalarHome.style.display = 'flex';
      btnInstalarHeader.style.display = 'block';
    });

    function handleInstall() {
      if (installPrompt) {
        installPrompt.prompt();
        installPrompt.userChoice.then(() => {
          installPrompt = null;
        });
      } else {
        const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isiOS) {
          alert('iPhone: toque em Compartilhar e depois em "Adicionar à Tela de Início".');
        } else {
          alert('Android: abra o menu do navegador e toque em "Instalar app" ou "Adicionar à tela inicial".');
        }
      }
    }

    btnInstalarHome.addEventListener('click', handleInstall);
    btnInstalarHeader.addEventListener('click', handleInstall);

    // Init
    showView(homeView);

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('SW error:', err);
        });
      });
    }
  </script>
</body>
</html>
